services:
  agent:
    build: .
    env_file: .env
    volumes:
      - ./.gws-config:/app/.gws-config
      - ./.env:/app/.env:ro
      - ./skill.md:/app/skill.md:ro
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./.gws-config:/app/.gws-config
      - ./.env:/app/.env:ro
      - ./skill.md:/app/skill.md:ro
      - ./data:/app/data
    command: ["uv", "run", "python", "dashboard.py"]
    restart: unless-stopped
